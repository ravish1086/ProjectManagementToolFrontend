<!-- ── Section Header ─────────────────────────────────────────────────────── -->
<div class="panel-section-header">
  <span class="section-title">Discussions</span>
  <div class="section-actions">
    <p-button icon="pi pi-plus" label="New Discussion" (onClick)="addDiscussionTrue = true"></p-button>
  </div>
</div>

<!-- ── Module Tabs ────────────────────────────────────────────────────────── -->
<div class="module-tabs" *ngIf="modulesList.length > 0">
  <p-tabView (onChange)="onModuleTabChange($event)" [(activeIndex)]="activeModuleIndex">
    <p-tabPanel *ngFor="let module of modulesList" [header]="module.moduleName"></p-tabPanel>
  </p-tabView>
</div>

<!-- ── Discussion Cards ───────────────────────────────────────────────────── -->
<div>
  <div
    class="record-card record-card--default"
    *ngFor="let discussion of allDiscussions"
  >
    <div class="record-card__header">
      <span class="record-title">{{ discussion.discussionTitle }}</span>
      <div class="record-actions">
        <button class="nav-icon-btn" (click)="menu.toggle($event); selectedDiscussion = discussion" title="Options">
          <i class="pi pi-ellipsis-v"></i>
        </button>
        <p-menu #menu [model]="items" [popup]="true">
          <ng-template pTemplate="item" let-item>
            <div class="flex-start-c gap-2 padding-10px">
              <span [class]="item.icon"></span>
              <span>{{ item.label }}</span>
            </div>
          </ng-template>
        </p-menu>
      </div>
    </div>

    <div class="record-card__body">
      <p>{{ discussion.discussionDescription }}</p>
    </div>

    <div class="record-card__footer">
      <div class="tag-group">
        <p-tag [severity]="discussionStatusConfig[discussion.discussionType]" [value]="discussion.discussionType" />
        <p-tag *ngIf="discussion.moduleId" [value]="discussion.moduleId.moduleName" severity="info" />
      </div>
      <div class="assignee-group">
        <p-chip *ngFor="let member of discussion.discussionMembers" [label]="member.fullName" icon="pi pi-user" />
      </div>
    </div>

    <div class="record-card__meta">
      <span class="meta-text">By: {{ discussion?.createdBy?.fullName }}</span>
      <span class="meta-text">{{ discussion.createdAtAgo }}</span>
    </div>

    <div class="comments-toggle">
      <p-panel styleClass="comments-panel" [toggleable]="true" [collapsed]="true">
        <ng-template pTemplate="header">
          <span style="font-size: 11px; font-weight: 600;">Comments</span>
        </ng-template>
        <ng-template pTemplate="content">
          <app-comments [entity]="discussion" [entityType]="'Discussion'"></app-comments>
        </ng-template>
      </p-panel>
    </div>
  </div>
</div>

<!-- ── Empty State ────────────────────────────────────────────────────────── -->
<div class="no-records-card" *ngIf="allDiscussions.length === 0">
  <i class="pi pi-comments"></i>
  No discussions yet — start one!
</div>

<!-- ── Add/Edit Dialog ────────────────────────────────────────────────────── -->
<p-dialog [(visible)]="addDiscussionTrue" [style]="{ width: '520px' }" [modal]="true" header="New Discussion">
  <app-add-discussion
    *ngIf="addDiscussionTrue"
    [selectedProject]="selectedProject"
    [selectedDiscussion]="selectedDiscussion"
    (discussionAdded)="getDiscussions(this.selectedProject._id); addDiscussionTrue=false"
  ></app-add-discussion>
</p-dialog>
