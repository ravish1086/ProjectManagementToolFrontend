
<form [formGroup]="formGroupName" (ngSubmit)="saveUpdateForm()" class="label-type1 master-form cm-d-flex flex-wrap f-gap-15">
    <div class="flex-100p">
        <label for="issueTitle">Issue Title<span class="asterisk">*</span></label>
        <input class="w-100" pInputText type="text" id="issueTitle" placeholder="Enter issue title" formControlName="issueTitle">
    </div>

    <div class="flex-50p">
        <label for="issueStatus">Status<span class="asterisk">*</span></label>
        <ng-select [items]="issueStatusList" placeholder="Select status" id="issueStatus" formControlName="issueStatus">
        </ng-select>
    </div>

    <div class="flex-50p">
        <label for="issuePriority">Priority<span class="asterisk">*</span></label>
        <ng-select [items]="issuePriorityList" placeholder="Select priority" id="issuePriority" formControlName="issuePriority">
        </ng-select>
    </div>

    <div class="flex-50p">
        <label for="issueType">Type<span class="asterisk">*</span></label>
        <ng-select [items]="issueTypesList" placeholder="Select type" id="issueType" formControlName="issueType">
        </ng-select>
    </div>

    <div class="flex-50p">
        <label for="issueDueDate">Due Date<span class="asterisk">*</span></label>
        <p-calendar id="issueDueDate" [iconDisplay]="'input'" formControlName="issueDueDate"
                    [showIcon]="true" dateFormat="dd/mm/yy" placeholder="Select date" class="w-100"></p-calendar>
    </div>

    <div class="flex-50p">
        <label for="moduleId">Module (Optional)</label>
        <ng-select [items]="modulesList" bindLabel="moduleName" bindValue="_id" placeholder="Select module" id="moduleId" formControlName="moduleId">
        </ng-select>
    </div>

    <div class="flex-50p">
        <!-- Spacer or another field -->
    </div>

    <div class="flex-100p">
        <label for="issueAssignee">Assignees<span class="asterisk">*</span></label>
        <ng-select [items]="selectedProject.projectMembers" bindLabel="fullName" multiple="true"
                   bindValue="_id" placeholder="Select members" id="issueAssignee" formControlName="issueAssignee">
        </ng-select>
    </div>

    <div class="flex-100p">
        <label for="issueDescription">Description<span class="asterisk">*</span></label>
        <p-editor formControlName="issueDescription" [style]="{ height: '200px' }" />
    </div>

    <div class="flex-100p j-end d-flex mt-4">
        <p-button type="submit" icon="pi pi-save" label="Save Issue" [loading]="false"></p-button>
    </div>
</form>
