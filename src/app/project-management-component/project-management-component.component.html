<div class="app-shell">

  <!-- ── Top Navbar ──────────────────────────────────────────────────────── -->
  <nav class="app-navbar">
    <div class="app-navbar__brand">
      <div class="brand-logo">DT</div>
      <span class="brand-name">DevTrack</span>
      <div class="project-name-badge" *ngIf="selectedProject" (click)="projectMenu.toggle($event)" style="cursor: pointer;">
        <span>{{ selectedProject?.projectName }}</span>
        <i class="pi pi-angle-down" style="margin-left: 8px;"></i>
      </div>
      <p-menu #projectMenu [popup]="true" [model]="projectMenuItems"></p-menu>
    </div>

    <div class="app-navbar__actions">
      <button class="nav-icon-btn" (click)="notificationsVisible = !notificationsVisible" title="Notifications">
        <i class="pi pi-bell"></i>
        <span class="nav-notification-badge" *ngIf="notificationsList.length > 0"></span>
      </button>
      <div class="nav-avatar" [title]="sessionObject.user.fullName">
        {{ (sessionObject.user.fullName || 'U')[0].toUpperCase() }}
      </div>
      <button class="nav-logout" (click)="logout()" title="Logout">
        <i class="pi pi-sign-out"></i>
        <span>Logout</span>
      </button>
    </div>
  </nav>

  <!-- ── Body (Sidebar + Main) ────────────────────────────────────────────── -->
  <div class="app-body">

    <!-- ── Left Project Rail ──────────────────────────────────────────────── -->
    <aside class="project-rail">
      <div class="project-rail__header">
        <h4>Projects</h4>
        <button class="nav-icon-btn" (click)="addProjectTrue = true" title="Add Project">
          <i class="pi pi-plus"></i>
        </button>
      </div>

      <div class="project-rail__list">
        <div *ngFor="let project of projectsList" class="project-rail-item"
          [class.active]="selectedProject?._id === project._id" (click)="selectProject(project)">
          <span class="project-rail-dot"></span>
          {{ project.projectName }}
        </div>
      </div>

      <!-- Team section in sidebar -->
      <div class="project-rail__header" style="margin-top: auto; border-top: 1px solid var(--color-border);">
        <h4>Team</h4>
      </div>
      <div class="project-rail__list" style="flex: 0 0 auto; max-height: 180px;">
        <ng-container *ngFor="let member of activeUsers">
          <div class="team-member-item" [class.disabled]="member._id === sessionObject.user._id"
            (click)="member._id !== sessionObject.user._id && openChat(member)">
            <span class="status-dot" [class.online]="member.active" [class.offline]="!member.active"></span>
            <span class="member-name">{{ member.fullName }}</span>
            <span class="member-you" *ngIf="member._id === sessionObject.user._id">You</span>
          </div>
        </ng-container>
      </div>
    </aside>

    <!-- ── Main Content ────────────────────────────────────────────────────── -->
    <main class="app-main">
      <div *ngIf="!selectedProject" class="tab-panel-content flex-center">
        <div class="no-records-card">
          <i class="pi pi-folder-open"></i>
          <span>Select a project from the left panel to get started</span>
        </div>
      </div>

      <ng-container *ngIf="selectedProject">
        <p-tabView [(activeIndex)]="activeIndex" class="app-tab-bar">
          <p-tabPanel header="Tasks" [cache]="false">
            <ng-template pTemplate="content">
              <div class="tab-panel-content">
                <app-tasks [selectedProject]="selectedProject"></app-tasks>
              </div>
            </ng-template>
          </p-tabPanel>

          <p-tabPanel header="Issues" [cache]="false">
            <ng-template pTemplate="content">
              <div class="tab-panel-content">
                <app-issues [selectedProject]="selectedProject"></app-issues>
              </div>
            </ng-template>
          </p-tabPanel>

          <p-tabPanel header="Discussions" [cache]="false">
            <ng-template pTemplate="content">
              <div class="tab-panel-content">
                <app-discussions [selectedProject]="selectedProject"></app-discussions>
              </div>
            </ng-template>
          </p-tabPanel>

          <p-tabPanel header="Notes" [cache]="false">
            <ng-template pTemplate="content">
              <div class="tab-panel-content">
                <app-notes [selectedProject]="selectedProject"></app-notes>
              </div>
            </ng-template>
          </p-tabPanel>

          <p-tabPanel header="Team">
            <ng-template pTemplate="content">
              <div class="tab-panel-content">
                <app-teams [selectedProject]="selectedProject" (projectUpdated)="getAllProjects()"></app-teams>
              </div>
            </ng-template>
          </p-tabPanel>

          <p-tabPanel header="Modules & APIs" [cache]="false">
            <ng-template pTemplate="content">
              <div class="tab-panel-content">
                <app-api-manager [selectedProject]="selectedProject"></app-api-manager>
              </div>
            </ng-template>
          </p-tabPanel>
        </p-tabView>
      </ng-container>
    </main>
  </div>
</div>

<!-- ── Notifications Drawer ────────────────────────────────────────────────── -->
<p-sidebar [(visible)]="notificationsVisible" [position]="'right'" [style]="{ width: '360px' }">
  <ng-template pTemplate="header">
    <div class="notifications-header">
      <h3>Notifications</h3>
    </div>
  </ng-template>
  <app-notifications [notifications]="notificationsList" (clickEvent)="goToAnchor($event.entityId)"></app-notifications>
</p-sidebar>

<!-- ── Add Project Dialog ──────────────────────────────────────────────────── -->
<p-dialog [(visible)]="addProjectTrue" [style]="{ width: '480px' }" [modal]="true" header="New Project">
  <app-add-project *ngIf="addProjectTrue" (projectAdded)="getAllProjects(); addProjectTrue=false"></app-add-project>
</p-dialog>

<!-- ── Edit Project Dialog ──────────────────────────────────────────────────── -->
<p-dialog [(visible)]="editProjectTrue" [style]="{ width: '480px' }" [modal]="true" header="Edit Project">
  <app-add-project *ngIf="editProjectTrue" [editProjectData]="selectedProject" (projectAdded)="getAllProjects(); editProjectTrue=false"></app-add-project>
</p-dialog>

<!-- ── Chat Widget ─────────────────────────────────────────────────────────── -->
<app-chat [receiver]="receiver" *ngIf="receiver" (closeChat)="closeChat()"></app-chat>
