<p-toast></p-toast>

<div class="notes-layout">
  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <div class="notes-toolbar">
    <h2>Daily Notes</h2>
    <div class="notes-controls">
      <p-calendar
        [(ngModel)]="selectedDate"
        (ngModelChange)="onDateChange()"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        id="noteDate"
        placeholder="Select date"
      ></p-calendar>
      <p-button label="Save" icon="pi pi-save" (onClick)="saveNote()" [loading]="isSaving"></p-button>
    </div>
  </div>

  <!-- ── Editor ───────────────────────────────────────────────────────────── -->
  <div class="notes-editor">
    <p-editor [(ngModel)]="noteContent" [style]="{ height: 'calc(100vh - 220px)' }"></p-editor>
  </div>
</div>
