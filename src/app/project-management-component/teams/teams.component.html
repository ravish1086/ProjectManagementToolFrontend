<!-- ── Section Header ─────────────────────────────────────────────────────── -->
<div class="panel-section-header">
  <div class="flex-start-c gap-3">
    <span class="section-title">Team</span>
    <span *ngIf="selectedProject?.projectManager" class="text-muted" style="font-size: 12px;">
      Manager: <strong class="text-primary">{{ selectedProject.projectManager.fullName }}</strong>
      <span class="text-secondary"> ({{ selectedProject.projectManager.designation }})</span>
    </span>
    <button pButton type="button" icon="pi pi-users" label="Manage Members" class="p-button-outlined p-button-sm ml-auto" (click)="openManageMembers()"></button>
  </div>
</div>

<!-- ── Team Grid ──────────────────────────────────────────────────────────── -->
<div class="team-grid">
  <div class="team-card" *ngFor="let member of projectMembers">
    <div class="team-avatar">{{ member.fullName?.charAt(0)?.toUpperCase() }}</div>
    <div class="team-name">{{ member.fullName }}</div>
    <div class="team-meta">
      <span>{{ member.designation }}</span>
      <span>{{ member.role }}</span>
      <span>{{ member.email }}</span>
    </div>
    <span
      class="team-manager-badge"
      *ngIf="member._id === selectedProject?.projectManager?._id"
    >Manager</span>
  </div>
</div>

<div class="no-records-card" *ngIf="!projectMembers || projectMembers.length === 0">
  <i class="pi pi-users"></i>
  No team members assigned
</div>

<!-- ── Manage Members Dialog ────────────────────────────────────────────────── -->
<p-dialog [(visible)]="manageMembersVisible" [style]="{ width: '400px' }" [modal]="true" header="Manage Team Members">
  <div class="p-fluid">
    <div class="field mb-4">
      <label for="members">Select Members</label>
      <ng-select [items]="usersList" bindLabel="fullName" [multiple]="true" bindValue="_id" placeholder="Select members" [(ngModel)]="selectedMembers" id="members">
      </ng-select>
    </div>
    <div class="flex j-end">
      <p-button label="Save" icon="pi pi-check" (click)="saveMembers()"></p-button>
    </div>
  </div>
</p-dialog>
