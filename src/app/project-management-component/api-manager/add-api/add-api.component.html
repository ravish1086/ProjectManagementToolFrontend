<div class="add-api-form" style="max-height: 70vh; overflow-y: auto; padding-right: 1rem;">
    <form [formGroup]="apiForm" (ngSubmit)="saveApi()">
        
        <div class="grid formgrid p-fluid">
            <div class="col-12 md:col-6 field">
                <label>Module</label>
                <p-dropdown [options]="modules" formControlName="moduleId" optionLabel="moduleName" optionValue="_id" placeholder="Select a Module"></p-dropdown>
            </div>
            <div class="col-12 md:col-6 field">
                <label>API Name</label>
                <input pInputText formControlName="apiName" />
            </div>
            
            <div class="col-12 md:col-4 field">
                <label>Method</label>
                <p-dropdown [options]="methods" formControlName="apiMethod"></p-dropdown>
            </div>
            <div class="col-12 md:col-8 field">
                <label>Endpoint</label>
                <input pInputText formControlName="apiEndpoint" placeholder="/api/v1/resource" />
            </div>

            <div class="col-12 field">
                <label>Description</label>
                <textarea pInputTextarea formControlName="apiDescription" rows="2"></textarea>
            </div>
        </div>

        <p-fieldset legend="Headers" [toggleable]="true" [collapsed]="true" styleClass="mb-3">
            <div formArrayName="apiHeaders">
                <div *ngFor="let header of apiHeaders.controls; let i=index" [formGroupName]="i" class="flex gap-2 mb-2 align-items-center">
                    <input pInputText formControlName="key" placeholder="Key" class="w-14rem"/>
                    <input pInputText formControlName="value" placeholder="Value" class="w-14rem"/>
                    <input pInputText formControlName="description" placeholder="Description" class="flex-grow-1"/>
                    <p-button icon="pi pi-trash" severity="danger" (onClick)="removeHeader(i)"></p-button>
                </div>
            </div>
            <p-button label="Add Header" icon="pi pi-plus" size="small" (onClick)="addHeader()" [outlined]="true"></p-button>
        </p-fieldset>

        <p-fieldset legend="Query Parameters" [toggleable]="true" [collapsed]="true" styleClass="mb-3">
            <div formArrayName="apiQueryParams">
                <div *ngFor="let param of apiQueryParams.controls; let i=index" [formGroupName]="i" class="flex gap-2 mb-2 align-items-center">
                    <input pInputText formControlName="key" placeholder="Key" class="w-10rem"/>
                    <p-dropdown [options]="paramTypes" formControlName="type" class="w-10rem"></p-dropdown>
                    <input pInputText formControlName="description" placeholder="Description" class="flex-grow-1"/>
                    <p-checkbox formControlName="required" [binary]="true" label="Req"></p-checkbox>
                    <p-button icon="pi pi-trash" severity="danger" (onClick)="removeQueryParam(i)"></p-button>
                </div>
            </div>
            <p-button label="Add Query Param" icon="pi pi-plus" size="small" (onClick)="addQueryParam()" [outlined]="true"></p-button>
        </p-fieldset>

        <div class="grid formgrid">
            <div class="col-12 md:col-6 field">
                <label>Request Body (JSON)</label>
                <textarea pInputTextarea formControlName="apiBodyText" rows="6" class="w-full font-mono text-sm" placeholder="{}"></textarea>
                <div *ngIf="parsedBody" class="mt-2 surface-100 p-2 border-round">
                    <ngx-json-viewer [json]="parsedBody" [expanded]="false"></ngx-json-viewer>
                </div>
                <small class="p-error" *ngIf="apiForm.get('apiBodyText')?.value && !parsedBody">Invalid JSON</small>
            </div>
            
            <div class="col-12 md:col-6 field">
                <label>Response Body (JSON)</label>
                <textarea pInputTextarea formControlName="apiResponseText" rows="6" class="w-full font-mono text-sm" placeholder="{}"></textarea>
                <div *ngIf="parsedResponse" class="mt-2 surface-100 p-2 border-round">
                    <ngx-json-viewer [json]="parsedResponse" [expanded]="false"></ngx-json-viewer>
                </div>
                <small class="p-error" *ngIf="apiForm.get('apiResponseText')?.value && !parsedResponse">Invalid JSON</small>
            </div>
        </div>

        <div class="flex justify-content-end gap-2 mt-4 pt-3 border-top-1 surface-border">
            <p-button label="Save API" type="submit" [disabled]="apiForm.invalid" icon="pi pi-check"></p-button>
        </div>
    </form>
</div>
