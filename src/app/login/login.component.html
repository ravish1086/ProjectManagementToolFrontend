<div class="login-container">
  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="login-logo">DT</div>
      <h1>DevTrack</h1>
      <p>Sign in to your workspace</p>
    </div>

    <!-- Form -->
    <form [formGroup]="formGroupeName" (ngSubmit)="login()">
      <div class="login-field">
        <label for="username">Username</label>
        <input
          pInputText
          type="text"
          id="username"
          placeholder="Enter your username"
          formControlName="username"
          autocomplete="username"
        >
        <div class="field-error" *ngIf="formGroupeName.get('username')?.invalid && formGroupeName.get('username')?.touched">
          <small *ngIf="formGroupeName.get('username')?.errors?.['required']">Username is required.</small>
        </div>
      </div>

      <div class="login-field">
        <label for="password">Password</label>
        <input
          pInputText
          type="password"
          id="password"
          placeholder="Enter your password"
          formControlName="password"
          autocomplete="current-password"
        >
        <div class="field-error" *ngIf="formGroupeName.get('password')?.invalid && formGroupeName.get('password')?.touched">
          <small *ngIf="formGroupeName.get('password')?.errors?.['required']">Password is required.</small>
        </div>
      </div>

      <div class="login-submit">
        <p-button type="submit" icon="pi pi-sign-in" iconPos="right" label="Sign In"></p-button>
      </div>
    </form>

  </div>
</div>
